{% extends "base.html"%} {% block title %}
<title>ลงทะเบียน</title>

{% endblock %} {% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-8">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-5">
            <h2 class="text-center fw-bold text-primary mb-4">
              <i class="bi bi-person-plus-fill me-2"></i>แบบฟอร์มลงทะเบียน
            </h2>
            <p class="text-center text-muted mb-4">กรุณากรอกข้อมูลให้ครบถ้วน</p>

            <form id="registrationForm" method="post" action="/form/">
              {% csrf_token %}
              <div class="mb-4">
                <label for="name" class="form-label fw-semibold">
                  <i class="bi bi-person-fill text-primary me-2"></i
                  >ชื่อ-นามสกุล
                </label>
                <input
                  type="text"
                  class="form-control form-control-lg bg-light border-0"
                  id="name"
                  name="name"
                  placeholder="กรอกชื่อ-นามสกุล"
                  required
                />
              </div>

              <div class="mb-4">
                <label for="age" class="form-label fw-semibold">
                  <i class="bi bi-calendar-fill text-primary me-2"></i>อายุ
                </label>
                <input
                  type="number"
                  class="form-control form-control-lg bg-light border-0"
                  id="age"
                  name="age"
                  placeholder="กรอกอายุ"
                  min="1"
                  max="150"
                  required
                />
              </div>

              <div class="d-grid gap-3 mt-4">
                <button
                  type="submit"
                  class="btn btn-primary btn-lg fw-bold rounded-pill shadow-sm"
                >
                  <i class="bi bi-check-circle-fill me-2"></i>ลงทะเบียน
                </button>
                <button
                  type="reset"
                  class="btn btn-outline-secondary btn-lg fw-bold rounded-pill"
                >
                  <i class="bi bi-x-circle-fill me-2"></i>ล้างข้อมูล
                </button>
              </div>
            </form>

            <div class="alert alert-info border-0 mt-4" role="alert">
              <small>
                <i class="bi bi-info-circle-fill me-2"></i>
                ข้อมูลของคุณจะถูกเก็บรักษาอย่างปลอดภัย
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
